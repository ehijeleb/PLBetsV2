name: Weekly model retrain

on:
  # Tuesday 03:00 UTC — after the weekend's matches and Monday football-data.co.uk update.
  schedule:
    - cron: "0 3 * * 2"
  # Allow manual trigger from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: retrain
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download latest season CSVs
        working-directory: backend
        run: python -m ml.download_data --seasons 5 --force

      - name: Train ensemble + Poisson goal model
        working-directory: backend
        run: python -m ml.train --skip-download

      - name: Sanity-check model.pkl exists and is non-trivial
        working-directory: backend
        run: |
          test -f models_out/model.pkl
          test -f models_out/goal_model.pkl
          test "$(wc -c < models_out/model.pkl)" -gt 100000

      - name: Commit refreshed model + CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/models_out/model.pkl backend/models_out/goal_model.pkl backend/data/raw/*.csv
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "chore(model): weekly retrain $(date -u +%Y-%m-%d)"
          git push
